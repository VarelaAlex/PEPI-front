surveyA:
  title: Questionnaire for early detection of learning difficulties in reading, writing, and arithmetic for students starting 5-year-old Early Childhood Education (A)
  instructions:
    title: Instructions
    instruction1: The questionnaire must be completed by the student's tutor or guardian.
    instruction2: It is recommended to fill out the entire questionnaire for a more complete evaluation.
    instruction3: For each item, the tutor or guardian can only choose one answer from "Never", "Almost never", "A few times", "Sometimes", and "Often".
    instruction4: In the event that any item does not fit the curriculum or methodological principles of the 2nd cycle of Early Childhood Education, you can choose "Don't know / Not applicable" as the answer.
    instruction5: The questionnaire contains a total of 24 items.
    instruction6: This version of the questionnaire is intended primarily for students finishing 4-year-old Early Childhood Education (between May and June of the school year) or starting 5-year-old Early Childhood Education (between September and December of the school year).
  button:
    next: Next
    prev: Previous
    submit: Submit
  options:
    never: Never
    almostNever: Almost never
    fewTimes: A few times
    sometimes: Sometimes
    often: Often
    unknown: Don't know / Not applicable
  steps:
    generalBehavior: General behavior
    speechAbility: Speech ability
    memoryAbility: Memory ability
    attentionAbility: Attention ability
    sequenceAbility: Sequencing ability
    muscleCoordination: Muscle coordination
    spatialOrientation: Sense of space and orientation
    emotionsSocialAdaptation: Emotions and social adaptation
  questions:
    generalBehavior:
      generalBehavior_1: In the notebook, leaves many eraser marks, the paper even tears or wrinkles from so much erasing
      generalBehavior_2: Behavior doing homework is irregular
      generalBehavior_3: Behavior in class is good, but performance is low
    speechAbility:
      speechAbility_1: Reacts slowly when having to answer questions orally
      speechAbility_2: Expresses themselves orally with difficulty (for example, cannot find the words to express their ideas)
      speechAbility_3: Makes grammatical errors when speaking
      speechAbility_4: Has difficulty pronouncing correctly
    memoryAbility:
      memoryAbility_1: Loses personal belongings, such as notebooks, pencils, or pencil cases, or forgets to do or bring homework
      memoryAbility_2: Has difficulty following a series of several consecutive instructions
      memoryAbility_3: Needs other people to remind them several times about certain information, such as bringing materials from home to work in the classroom
      memoryAbility_4: Has difficulty memorizing the names of people or places
      memoryAbility_5: Has difficulty learning songs or children's poems, even simple ones
      memoryAbility_6: Has difficulty learning a schedule that is somewhat complex
      memoryAbility_7: Has difficulty remembering personal information, such as date of birth, phone number, address, etc.
    attentionAbility:
      attentionAbility_1: Gets distracted easily
      attentionAbility_2: Has difficulty concentrating on one thing for a long time (for example, when doing tasks, stops frequently, gets up to talk with other classmates)
      attentionAbility_3: Has difficulty repeating information just heard, such as phone numbers, people's names, or story content
    sequenceAbility:
      sequenceAbility_1: Has difficulty assimilating time concepts (does not distinguish yesterday, today, and tomorrow)
      sequenceAbility_2: Makes mistakes in order when having to memorize words or numbers in a sequence (for example, the order of the four seasons or phone numbers)
      sequenceAbility_3: Needs a lot of time to learn to tell time
    muscleCoordination:
      muscleCoordination_1: When coloring a drawing, goes outside the lines
      muscleCoordination_2: Has difficulty when running and jumping (for example, falls often or gets injured)
      muscleCoordination_3: When doing games with a lot of movement, for example, jumping rope, gets tired easily
      muscleCoordination_4: Motor performance is low (for example, cannot perform the movements indicated by the teacher)
      muscleCoordination_5: Has difficulty jumping rope, throwing, catching, or kicking the ball
      muscleCoordination_6: In class cannot clap following simple rhythms
      muscleCoordination_7: Has difficulty tying shoelaces and buttoning buttons more than children their age
    spatialOrientation:
      spatialOrientation_1: Has difficulty distinguishing between up and down or between left and right
      spatialOrientation_2: Has difficulty with orientation (for example, needs a lot of time to know how to get to different classrooms, staff room, or music room)
    emotionsSocialAdaptation:
      emotionsSocialAdaptation_1: Has difficulty relating to other people (for example, often argues with siblings or classmates)
      emotionsSocialAdaptation_2: Has a poor self-image
      emotionsSocialAdaptation_3: Gets discouraged or gives up on doing things easily
      emotionsSocialAdaptation_4: Has headaches, stomach aches, gets angry, or becomes nervous when feeling pressured
  validationError: Please answer all questions before proceeding to the next step or submitting the form.
