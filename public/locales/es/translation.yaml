student:
  title: Rol Alumno
  sub1:
    title: ¿Cómo se trabaja con PEPI?
    intro: Pasos y modalidades para realizar los ejercicios con el rol de alumno.
    divisions:
      - title: Primeros pasos
        intro:
          - Cuando accedemos a PEPI con el usuario de alumno vemos que <bold>¡¡aparece nuestra amiga PEPI!!</bold> Ella nos explica cómo trabajar y guía el proceso de aprendizaje.
          - Además, PEPI nos habla tanto durante el error como durante el acierto, para evitar que la resolución de los ejercicios se realice de forma mecánica sin comprender el porqué de lo que estamos haciendo.
          - "En el programa encontraremos dos bloques: <linkPreparation>PREPARACIÓN</linkPreparation> y <linkTraining>ENTRENAMIENTO</linkTraining>."

  sub2:
    title: Preparación
    intro: La preparación está diseñada para aprender el significado de los pictogramas que representan los enlaces en la presentación icónica y combinada. Los pictogramas son imágenes a las que les hemos atribuido un significado nuevo. En PEPI hay seis pictogramas y seis ejercicios para aprender qué significan.
    divisions:
      - title: Ejercicios 1 y 2
        intro:
          - Estos ejercicios están diseñados para conocer el significado de cada pictograma. La tarea consiste en colocar el pictograma que nos dice PEPI en el lugar correspondiente. PEPI nos dará las instrucciones sin necesidad de leerlas en la pantalla. Si PEPI dice "es" debemos mover los dos círculos arrastrándolos al cajón de respuesta que está en la parte inferior.
        imgs:
          - src: /images/activity1.png
            alt: Actividad 1
          - src: /images/activity2.png
            alt: Actividad 2
      - title: Ejercicios 3 y 4
        intro:
          - Consisten en colocar los elementos para ordenar la frase, utilizando para ello tanto las imágenes como los pictogramas que estamos aprendiendo. Nuevamente, primero escucharemos a PEPI y después ordenaremos los elementos arrastrándolos a la parte inferior.
        imgs:
          - src: /images/activity3.png
            alt: Actividad 3
          - src: /images/activity4.png
            alt: Actividad 4
      - title: Ejercicio 5
        intro:
          - Para aproximarnos al lugar del pictograma en la red, el ejercicio 5 consiste en colocar el pictograma que nos dice PEPI en el lugar correspondiente. Recordemos que tres pictogramas son para definir (rama izquierda) y tres para ampliar la información (rama derecha).
        imgs:
          - src: /images/activity5.png
            alt: Actividad 5
      - title: Ejercicio 6
        intro:
          - El último ejercicio nos permite aproximarnos a lo que va a ocurrir cuando iniciemos el entrenamiento. Ahora será necesario que coloquemos cada elemento en el lugar correspondiente de la red arrastrándolo.
        imgs:
          - src: /images/activity6.png
            alt: Actividad 6
    ending:
      - Una vez que has finalizado la preparación, es el momento de iniciar el entrenamiento.

  sub3:
    title: Entrenamiento
    intro: "El entrenamiento puede realizarse de dos formas: Cerrada y Abierta."
    divisions:
      - title: Descripción
        intro:
          - En la modalidad <bold>cerrada</bold> PEPI nos va mostrando el ejercicio que debemos realizar siguiendo una secuenciación en función del grado de dificultad y de nuestro rendimiento. La realización de un ejercicio permitirá desbloquear otros de dificultad superior.
          - En la modalidad <bold>abierta</bold> el niño puede elegir el ejercicio que desee.
          - Recomendamos empezar a trabajar en la modalidad cerrada, y una vez terminada esta modalidad, podremos trabajar de forma libre en la modalidad abierta.
          - "Para realizar un ejercicio en PEPI seguiremos <bold>TRES</bold> pasos: Seleccionar el texto de partida, transformar el texto en red y transformar la red en texto."
      - title: Seleccionar el texto de partida
        intro:
          - "El programa consta de diferentes actividades en las que, como ya sabemos, la información se presenta de cuatro formas: icónica (solo imágenes), combinada (imágenes asociadas a palabras), global (palabras completas) y simbólica (palabras fragmentadas)."
          - "En la modalidad abierta en el menú central es posible seleccionar el tipo de presentación y posteriormente la temática del ejercicio organizada en cinco bloques de conocimiento: el cuerpo y los alimentos, la familia, los transportes, los animales y las estaciones."
          - "Elegida la temática, aparecerán diferentes ejercicios con los que se trabaja con textos simples que se deberán organizar en tres tipos de redes: red 1-1, red 1-2 y red 1-3."
          - "En la modalidad cerrada PEPI mostrará los ejercicios ya realizados que permiten ir desbloqueando otros de mayor dificultad."
          - "Una vez iniciado un ejercicio, aparecerá en la parte superior de la pantalla un mensaje lineal y en la parte inferior una red vacía."
      - title: Transformar el texto lineal en red
        intro:
          - "El objetivo de esta segunda fase es trabajar la comprensión del contenido. En el caso de la presentación icónica, combinada y global, es necesario arrastrar los elementos del texto lineal al Hypertexto en una secuencia concreta con la que se busca favorecer la comprensión:"
          - 'Primero ponemos el barco (el título) en el rectángulo donde pone "1". Después, volvemos a colocar "el barco" en el rectángulo "1", ponemos "es para" donde pone "2" y "navegar" donde pone "3". Colocamos el stop en el "4". Nuevamente, ponemos "el barco" en el rectángulo "1", cogemos el "tiene" y lo colocamos en el "5", velas en el "6" y el stop en el "7".'
        imgs:
          - src: /images/textToHyper.png
            alt: Transformar el texto lineal en red
        presentation:
          - title: Icónica, combinada y global
            text: Durante la transformación del texto lineal a la red, en estos tres tipos de presentación (<bold>icónica</bold>, <bold>combinada</bold> y <bold>global</bold>), conviene tener en cuenta algunas claves
            steps:
              - Los signos de puntuación se sustituyen por la imagen del STOP. Pasamos de la rama izquierda a la rama derecha con STOP, los bolos hermanos cuando son dos o tres se separan con un stop pequeño que representa una parada más corta. El Hyper (o la red) termina con el STOP grande.
              - Si intentamos colocar un elemento en el lugar equivocado, el programa nos permite cogerlo y moverlo, pero una vez que lo situamos en un lugar erróneo, el elemento vuelve a su sitio. Por ejemplo, si cogemos el barco y queremos ponerlo en un bolo en lugar de en el rectángulo, el barco vuelve a su sitio en el texto inicial de la parte superior.
              - Si intentamos hacer el ejercicio de forma desordenada, por ejemplo, intentamos coger las velas antes que "el barco", el programa nos permite coger ese elemento, pero una vez que lo situamos, aunque se trate del lugar correcto, el elemento vuelve a su sitio.
              - Una vez que finalizamos el ejercicio correctamente, aparecerá un refuerzo.
          - title: Simbólica
            text: En el caso de la presentación <bold>simbólica</bold>, tendremos que escribir la palabra (de ahí la idea de "palabra fragmentada") del mensaje lineal en el lugar correspondiente sin olvidar aspectos clave como que
            steps:
              - Si nos equivocamos, y escribimos la palabra de forma incorrecta ortográficamente, el programa no nos permitirá continuar.
              - Si tratamos de escribir en el lugar erróneo, sin respetar el orden establecido, el programa no nos permitirá trabajar.
              - 'Debemos recordar colocar los signos de puntuación teniendo en cuenta que: siempre pasamos de la rama izquierda a la rama derecha con punto y aparte, los bolos hermanos cuando son dos (red 1-2) se separan con "y" pero cuando son tres (red 1-3), se separan con "," y el último con "y". El ejercicio termina con el punto y final. Simplemente debemos escribir: ","  "y" o ".".'
      - title: Transformar la red a texto lineal
        intro:
          - El objetivo de esta fase es trabajar la expresión del contenido. Para ello, en una nueva pantalla aparece la red completada en la parte superior, y los espacios necesarios para convertirla nuevamente en un texto lineal se mostrarán en la parte inferior.
        imgs:
          - src: /images/hyperToText.png
            alt: Transformar la red en texto lineal
        presentation:
          - title: Icónica, combinada y global
            text: En la presentación <bold>icónica</bold>, <bold>combinada</bold> y <bold>global</bold>, deberemos arrastrar los elementos de la red al lugar correspondiente del mensaje lineal, teniendo en cuenta que
            steps:
              - Los signos de puntuación se sustituyen por la imagen del STOP. Pasamos de la rama izquierda a la rama derecha con STOP, los bolos hermanos cuando son dos o tres se separan con un stop pequeño que representa una parada más corta. El Hyper (o la red) termina con el STOP grande.
              - Si intentamos colocar un elemento en el lugar equivocado, el programa nos permite cogerlo y moverlo, pero una vez que lo situamos en un lugar erróneo, el elemento vuelve a su sitio. Por ejemplo, si cogemos el barco y queremos ponerlo en un bolo en lugar de en el rectángulo, el barco vuelve a su sitio en el texto inicial de la parte superior.
              - Si intentamos hacer el ejercicio de forma desordenada, por ejemplo, intentamos coger las velas antes que "el barco", el programa nos permite coger ese elemento, pero una vez que lo situamos, aunque se trate del lugar correcto, el elemento vuelve a su sitio.
              - Una vez que finalizamos el ejercicio correctamente, aparecerá un refuerzo.
          - title: Simbólica
            text: "En la presentación simbólica tendremos que escribir la palabra del mensaje lineal en el lugar correspondiente teniendo en cuenta tres claves:"
            steps:
              - Si nos equivocamos y escribimos la palabra de forma incorrecta ortográficamente, el programa no nos permitirá continuar.
              - Si tratamos de escribir en el lugar erróneo, sin respetar el orden establecido, el programa no nos permitirá trabajar.
              - Debemos recordar colocar los signos de puntuación "," "y" o "."

