site:
  title: Centro de Ayuda

general:
  title: Información General
  sub1:
    title: ¿Qué es PEPI?
    intro: Presentación del programa PEPI y sus fundamentos.
    body:
      - 'PEPI es la revisión y actualización del Programa en papel y lápiz "EPI - Estimulación del Pensamiento y la Inteligencia" para niños de Educación Infantil y Educación Primaria.'
      - topic: "El objetivo del programa es doble:"
        explanation:
              - De un lado, se busca trabajar habilidades de aproximación a la lectoescritura con el fin de favorecer la comprensión y expresión a edades muy tempranas.
              - "De otro lado, el programa permite iniciar al alumno en la organización de la información trabajando un tipo de mapa conceptual muy sencillo. 
                 Esto es muy importante porque, si incluso antes de que el niño lea, mejoramos la calidad del procesamiento (léxico, semántico y sintáctico) y el manejo de la información; se estimula la inteligencia, el pensamiento y el potencial de aprendizaje."
      - PEPI se basa en el Hypertexto (revisado y actualizado en el programa Hyper), un tipo de mapa conceptual con reglas internas que permite estructurar la información en redes, estableciendo conexiones significativas entre los contenidos seleccionados.

  sub2:
    title: Sobre la estrategia
    intro: Fundamentos de la estrategia Hypertexto en la que se basa PEPI.
    body:
      - Con Hyper se trabaja de forma conjunta el procesamiento léxico, semántico y sintáctico (implicados en la comprensión-expresión), pero también la organización del conocimiento en red.
      - "Hyper se apoya sobre la idea de que comprender no va a depender exclusivamente de cómo se interpreta o construye la información, sino también de cómo se selecciona, se relaciona y se transmite, tanto verbalmente como por escrito. 
         De ahí la eficacia de trabajar los procesos de comprensión-expresión unidos en un mismo bloque, haciendo que el alumno participe de forma activa a la hora de traducir, interpretar y extrapolar lo aprendido.
         Para ello, es preciso aprender a transformar los mensajes lineales en mapas conceptuales o estructuras con forma de red, tipo Hyper."
      - PEPI utiliza tres tipos de red y cuatro tipos de presentación que se ajustan a los diferentes niveles y necesidades de los estudiantes.

  sub3:
    title: Tipos de Red y Presentación
    intro: Estructuras y formatos con los que PEPI organiza la información.
    divisions:
      - title: Tres Tipos de Red
        body: Los tres tipos de red son la red 1-1, la red 1-2 y la red 1-3. Se define en la rama izquierda y se amplía la información en la rama derecha.
        steps:
          - "Red 1-1: un bolo en la rama izquierda y uno en la derecha."
          - "Red 1-2: un bolo en la izquierda y dos en la derecha."
          - "Red 1-3: un bolo en la izquierda y tres en la derecha."

      - title: Signos de puntuación
        body: Para cada uno de los tipos de red, los signos de puntuación (y por tanto la expresión) tienen ciertas peculiaridades.
        steps:
          - "Los bolos hermanos se separan con <code>,</code>, <code>y</code> o con STOPs de menor tamaño <smallStop/>."
          - "Siempre se pasa de la rama izquierda a la derecha con punto y aparte <code>.</code> o STOP de mayor tamaño <bigStop/>."
          - "Siempre se termina la rama derecha con punto y final <code>.</code> o STOP de mayor tamaño <bigStop/>."

      - title: Cuatro Tipos de Presentación
        body: La información se presenta de cuatro formas para ajustarse a los diferentes niveles de los estudiantes.
        steps:
          - "Icónica: solo imágenes."
          - "Combinada: imágenes asociadas a palabras."
          - "Global: palabras completas — trabaja la ruta léxica."
          - "Simbólica: palabras fragmentadas — hay que escribir cada letra, desarrollando la ruta fonológica."
        descriptions:
          - La presentación icónica y combinada sustituyen los contenidos y los verbos por imágenes y pictogramas. Para la sustitución de los contenidos por imágenes este programa se conecta con la base de datos del Centro Aragonés para la Comunicación Aumentativa y Alternativa (ARASAAC).
          - En la presentación global la palabra aparece de forma completa, y como veremos, los ejercicios se resuelven arrastrándola sin necesidad de escribir. En esta presentación trabajamos fundamentalmente la ruta léxica de la lectura. Sin embargo, en la presentación simbólica será necesario escribir la palabra, para ello, debemos fragmentarla y así teclear cada una de las letras que componen la palabra lo que permite desarrollar la ruta fonológica.
          - <bold>¿Por qué una presentación global y una presentación simbólica?</bold>
          - Con el programa buscamos iniciarnos en la organización de la información incluso antes de manejar la lectoescritura, con la presentación global tratamos de avanzar en este objetivo para posteriormente continuar con la organización una vez ya iniciada la lectoescritura.
          - El procedimiento específico para desarrollar cada uno de los ejercicios en estos tipos de red y tipos de presentación, lo encontraremos en el apartado <linkWorkWithPepi>¿Cómo se trabaja con PEPI?</linkWorkWithPepi>

      - title: Pictogramas y ARASAAC
        body: La presentación icónica y combinada sustituye contenidos y verbos por imágenes y pictogramas conectados con la base de datos de ARASAAC.
        steps:
          - ARASAAC cuenta con más de 13 500 imágenes y pictogramas.
          - "6 pictogramas para verbos: 3 para definir (es, es para, es parte de) y 3 para ampliar (tiene, sirve para, está en)."
          - El uso del verbo en plural requiere dos pictogramas en lugar de uno.

teacher:
  help:
    tooltip: Ayuda para profesores
  title: Rol Docente
  faq:
    title: Preguntas Frecuentes
    intro: Guía de uso del perfil docente en PEPI.
    items:
      - q: ¿Cómo puedo registrarme?
        type: steps
        a: 'Cuando accedemos a PEPI podemos elegir el tipo de perfil de usuario: Profesor o Alumno.'
        steps:
          - 'Accede a PEPI y selecciona el tipo de perfil <bold>Profesor / Profesora</bold>.'
          - 'Haz click en <bold>"Regístrate"</bold>.'
          - 'Rellena tu nombre, apellidos, correo electrónico y contraseña.'
          - 'Ya puedes generar aulas, dar de alta alumnos y visualizar sus estadísticas.'

      - q: ¿Cómo generar un aula?
        type: steps
        a: 'Crear un aula es muy sencillo:'
        steps:
          - 'En la pantalla principal, rellena los campos: nombre del aula y nivel educativo.'
          - 'Haz click en <bold>"Añadir aula"</bold>.'

      - q: ¿Cómo dar de alta a un alumno?
        type: steps
        a: 'Es muy sencillo dar de alta a tus alumnos, sigue estos pasos:'
        steps:
          - 'Haz click en el nombre del aula a la que quieres añadir el alumno.'
          - 'En <bold>"Mis aulas"</bold>, haz click sobre el nombre del aula.'
          - 'Pulsa <bold>"Añadir alumno"</bold> en la parte inferior.'
          - 'Rellena los datos obligatorios: nombre, apellido/s, edad, fecha de nacimiento, número de clase y colegio.'
          - '(Opcional, pero altamente recomendable) Completa la información complementaria sobre contexto familiar y necesidades educativas.'
          - 'Una vez creado el alumno podemos acceder al aula para ver el <bold>nombre de usuario</bold> del alumno. Además, veremos el botón <bold>"Completar encuesta"</bold> que permite acceder a una encuesta sobre el nivel de lectoescritura del alumno. Se trata de ítems de pregunta corta y respuesta rápida.'
        note: 'La información del alumno puede editarse en cualquier momento pinchando sobre su nombre.'

      - q: ¿Cómo visualizar el rendimiento de un aula o de un alumno?
        type: steps
        a: 'Hay dos niveles de estadísticas disponibles:'
        steps:
          - 'En la pantalla principal, columna <bold>"Ver estadísticas"</bold> del aula → número de ejercicios realizados por todos los alumnos.'
          - 'Dentro del aula, columna <bold>"Ver estadísticas"</bold> del alumno → ejercicios realizados y errores cometidos.'

      - q: ¿Qué otras utilidades ofrece la versión del profesor?
        type: list
        a: 'Desde el perfil del profesor también puedes:'
        items:
          - 'Generar nuevos ejercicios personalizados.'
          - 'Consultar información relacionada con la estrategia PEPI.'
