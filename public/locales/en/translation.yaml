site:
  title: Help Center

general:
  title: General Information
  sub1:
    title: What is PEPI?
    intro: Presentation of the PEPI program and its foundations.
    body:
      - PEPI is the review and update of the paper-and-pencil program "EPI – Estimulación del Pensamiento y la Inteligencia (Stimulation of Thinking and Intelligence)" for children in Early Childhood and Primary Education.
      - topic: "The program has a dual objective:"
        explanation:
          - On one hand, it aims to develop pre-literacy skills in order to foster comprehension and expression at very early ages.
          - "On the other hand, the program introduces students to information organization by working with a very simple type of concept map.
                 This is very important because, even before children can read, improving the quality of processing (lexical, semantic and syntactic) and information management stimulates intelligence, thinking and learning potential."
      - PEPI is based on Hypertext (reviewed and updated in the Hyper program), a type of concept map with internal rules that allows information to be structured in networks, establishing meaningful connections between selected content.

  sub2:
    title: About the Strategy
    intro: Foundations of the Hypertext strategy on which PEPI is based.
    body:
      - Hyper works simultaneously on lexical, semantic and syntactic processing (involved in comprehension-expression), as well as on the networked organization of knowledge.
      - "Hyper is built on the idea that comprehension does not depend exclusively on how information is interpreted or constructed, but also on how it is selected, related and conveyed, both verbally and in writing.
         Hence the effectiveness of working on comprehension-expression processes together in a single block, making students actively participate in translating, interpreting and extrapolating what they have learned.
         To do this, it is necessary to learn to transform linear messages into concept maps or network-shaped structures, like Hyper."
      - PEPI uses three types of network and four types of presentation that adapt to the different levels and needs of students.

  sub3:
    title: Network Types and Presentation
    intro: Structures and formats with which PEPI organizes information.
    divisions:
      - title: Three Types of Network
        body: The three network types are the 1-1 network, the 1-2 network and the 1-3 network. Information is defined in the left branch and expanded in the right branch.
        steps:
          - "1-1 Network: one node on the left branch and one on the right."
          - "1-2 Network: one node on the left and two on the right."
          - "1-3 Network: one node on the left and three on the right."

      - title: Punctuation Marks
        body: For each network type, punctuation marks (and therefore expression) have certain particularities.
        steps:
          - "Sibling nodes are separated by <code>,</code>, <code>and</code> or smaller STOPs <smallStop/>."
          - "The transition from the left branch to the right is always marked with a full stop <code>.</code> or a larger STOP <bigStop/>."
          - "The right branch always ends with a final full stop <code>.</code> or a larger STOP <bigStop/>."

      - title: Four Types of Presentation
        body: Information is presented in four ways to suit the different levels of students.
        steps:
          - "Iconic: images only."
          - "Combined: images associated with words."
          - "Global: complete words — works the lexical route."
          - "Symbolic: fragmented words — each letter must be written, developing the phonological route."
        descriptions:
          - The iconic and combined presentation replaces content and verbs with images and pictograms. To replace content with images, this program connects to the database of the Aragonese Center for Augmentative and Alternative Communication (ARASAAC).
          - In the global presentation, the word appears in its complete form, and as we will see, the exercises are solved by dragging it without the need to write. In this presentation, we primarily work on the lexical route of reading. However, in the symbolic presentation it will be necessary to write the word; to do so, we must break it down and type each of the letters that make up the word, which allows the phonological route to be developed.
          - <bold>Why a global presentation and a symbolic presentation?</bold>
          - With the program, we aim to begin organizing information even before mastering reading and writing. With the global presentation, we seek to advance this goal, and later continue with organization once reading and writing have been introduced.
          - The specific procedure for carrying out each of the exercises in these network types and presentation types can be found in the section <linkWorkWithPepi>How do we work with Pepi?</linkWorkWithPepi>

      - title: Pictograms and ARASAAC
        body: The iconic and combined presentations replace content words and verbs with images and pictograms connected to the ARASAAC database.
        steps:
          - ARASAAC has more than 13,500 images and pictograms.
          - "6 pictograms for verbs: 3 for defining (is, is for, is part of) and 3 for expanding (has, is used for, is in)."
          - Using the verb in the plural requires two pictograms instead of one.

teacher:
  help:
    tooltip: Help for teachers
  title: Teacher Role
  faq:
    title: Frequently Asked Questions
    intro: Guide to using the teacher profile in PEPI.
    items:
      - q: How do I sign up?
        type: steps
        a: 'When we access PEPI we can choose the type of user profile: Teacher or Student.'
        steps:
          - 'Access PEPI and select the profile type <bold>Teacher</bold>.'
          - 'Click on <bold>"Sign up"</bold>.'
          - 'Fill in your name, last name, email and password.'
          - 'You can now create classrooms, enroll students and view their statistics.'

      - q: How do I create a classroom?
        type: steps
        a: 'Creating a classroom is very simple:'
        steps:
          - 'On the main screen, fill in the fields: classroom name and educational level.'
          - 'Click on <bold>"Add classroom"</bold>.'

      - q: How do I add a student?
        type: steps
        a: 'Adding your students is very simple, just follow these steps:'
        steps:
          - 'Click on the name of the classroom you want to add the student to.'
          - 'In <bold>"My classrooms"</bold>, click on the classroom name.'
          - 'Click <bold>"Add student"</bold> at the bottom.'
          - 'Fill in the required information: name, last name(s), age, date of birth, classroom number and school.'
          - '(Optional, but highly recommended) Complete the supplementary information about family background and educational needs.'
          - 'Once the student has been created, we can access the classroom to see the student''s <bold>username</bold>. In addition, we will see the <bold>"Complete survey"</bold> button, which provides access to a survey about the student''s literacy level. These are short-answer, quick-response items.'
        note: 'Student information can be edited at any time by clicking on their name.'

      - q: How do I view classroom or student performance?
        type: steps
        a: 'There are two levels of statistics available:'
        steps:
          - 'On the main screen, <bold>"See statistics"</bold> column for the classroom → number of exercises completed by all students.'
          - 'Inside the classroom, <bold>"See statistics"</bold> column for the student → exercises completed and errors made.'

      - q: What other features does the teacher version offer?
        type: list
        a: 'From the teacher profile you can also:'
        items:
          - 'Create new personalized exercises.'
          - 'Consult information related to the PEPI strategy.'
        note: 'To access these options, click on the <bold><userIcon/> user</bold> icon in the top left.'

