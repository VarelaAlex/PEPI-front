    instruction3: For each item, the tutor or guardian can only choose one answer from "Never", "Almost never", "A few times", "Sometimes", and "Often".
    instruction4: In the event that any item does not fit the curriculum or methodological principles of Primary Education, you can choose "Don't know / Not applicable" as the answer.
    instruction5: The questionnaire contains a total of 24 items.
    instruction6: This version of the questionnaire is intended primarily for students finishing 5-year-old Early Childhood Education (between May and June of the school year) or starting 1st grade of Primary Education (between September and December of the school year).
