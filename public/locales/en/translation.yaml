student:
  title: Student Role
  sub1:
    title: How do we work with PEPI?
    intro: Steps and modalities for completing exercises in the student role.
    divisions:
      - title: First steps
        intro:
          - When we access PEPI with a student account, <bold>our friend PEPI appears!!</bold> She explains how to work and guides the learning process.
          - In addition, PEPI speaks to us both during errors and correct answers, to prevent exercises from being completed mechanically without understanding the reason behind what we are doing.
          - "In the program we will find two blocks: <linkPreparation>PREPARATION</linkPreparation> and <linkTraining>TRAINING</linkTraining>."

  sub2:
    title: Preparation
    intro: Preparation is designed to learn the meaning of the pictograms that represent links in the iconic and combined presentation. Pictograms are images to which we have assigned a new meaning. In PEPI there are six pictograms and six exercises to learn what they mean.
    divisions:
      - title: Exercises 1 and 2
        intro:
          - These exercises are designed to learn the meaning of each pictogram. The task consists of placing the pictogram that PEPI indicates in the correct location. PEPI will give instructions without needing to read them on screen. If PEPI says "is", we must move the two circles by dragging them to the answer box at the bottom.
        imgs:
          - src: /images/activity1.png
            alt: Activity 1
          - src: /images/activity2.png
            alt: Activity 2
      - title: Exercises 3 and 4
        intro:
          - These consist of arranging elements to form the sentence, using both the images and the pictograms we are learning. Again, we will first listen to PEPI and then arrange the elements by dragging them to the bottom.
        imgs:
          - src: /images/activity3.png
            alt: Activity 3
          - src: /images/activity4.png
            alt: Activity 4
      - title: Exercise 5
        intro:
          - To get familiar with the position of the pictogram in the network, exercise 5 consists of placing the pictogram that PEPI indicates in the correct location. Remember that three pictograms are for defining (left branch) and three for expanding information (right branch).
        imgs:
          - src: /images/activity5.png
            alt: Activity 5
      - title: Exercise 6
        intro:
          - The last exercise allows us to get an idea of what will happen when we begin training. Now we will need to place each element in the correct position in the network by dragging it.
        imgs:
          - src: /images/activity6.png
            alt: Activity 6
    ending:
      - Once you have finished the preparation, it is time to begin training.

  sub3:
    title: Training
    intro: "Training can be done in two ways: Closed and Open."
    divisions:
      - title: Description
        intro:
          - In <bold>closed</bold> mode, PEPI shows us the exercise to complete following a sequence based on difficulty level and our performance. Completing an exercise will unlock others of greater difficulty.
          - In <bold>open</bold> mode, the student can choose whichever exercise they wish.
          - We recommend starting in closed mode, and once that mode is completed, we can work freely in open mode.
          - "To complete an exercise in PEPI we follow <bold>THREE</bold> steps: Select the source text, transform the text into a network, and transform the network back into text."
      - title: Select the source text
        intro:
          - "The program consists of different activities in which, as we already know, information is presented in four ways: iconic (images only), combined (images associated with words), global (complete words) and symbolic (fragmented words)."
          - "In open mode, the central menu allows you to select the type of presentation and then the topic of the exercise, organized into five knowledge blocks: body and food, family, transport, animals and seasons."
          - "Once a topic is chosen, different exercises will appear that work with simple texts which must be organized into three types of networks: 1-1 network, 1-2 network and 1-3 network."
          - "In closed mode, PEPI will show the completed exercises that allow progressively unlocking others of greater difficulty."
          - "Once an exercise has started, a linear message will appear at the top of the screen and an empty network at the bottom."
      - title: Transform the linear text into a network
        intro:
          - "The goal of this second phase is to work on content comprehension. In the case of iconic, combined and global presentation, it is necessary to drag the elements of the linear text into the Hypertext in a specific sequence designed to foster comprehension:"
          - 'First we place the boat (the title) in the rectangle labeled "1". Then, we place "the boat" again in rectangle "1", put "is for" where "2" is, and "sailing" where "3" is. We place the stop at "4". Again, we place "the boat" in rectangle "1", take "has" and place it at "5", sails at "6" and the stop at "7".'
        imgs:
          - src: /images/textToHyper.png
            alt: Transform the linear text into a network
        presentation:
          - title: Iconic, combined and global
            text: During the transformation from linear text to network, in these three presentation types (<bold>iconic</bold>, <bold>combined</bold> and <bold>global</bold>), it is worth keeping some key points in mind
            steps:
              - Punctuation marks are replaced by the STOP image. We move from the left branch to the right branch with a STOP; sibling nodes when there are two or three are separated by a small stop representing a shorter pause. The Hyper (or network) ends with the large STOP.
              - If we try to place an element in the wrong location, the program allows us to pick it up and move it, but once we place it in an incorrect spot, the element returns to its original position. For example, if we pick up the boat and try to place it in a node instead of in the rectangle, the boat returns to its place in the initial text at the top.
              - If we try to complete the exercise out of order — for example, trying to pick up the sails before "the boat" — the program allows us to pick up that element, but once we place it, even if it is in the correct location, the element returns to its place.
              - Once we complete the exercise correctly, a reward will appear.
          - title: Symbolic
            text: In the case of the <bold>symbolic</bold> presentation, we will need to type the word (hence the idea of "fragmented word") from the linear message in the correct location, remembering key points such as
            steps:
              - If we make a mistake and write the word with incorrect spelling, the program will not allow us to continue.
              - If we try to write in the wrong location, without respecting the established order, the program will not allow us to work.
              - 'We must remember to place punctuation marks keeping in mind that: we always move from the left branch to the right branch with a full stop, sibling nodes when there are two (1-2 network) are separated by "and", but when there are three (1-3 network), they are separated by "," and the last one by "and". The exercise ends with a final full stop. We simply need to type: ","  "and" or ".".'
      - title: Transform the network into linear text
        intro:
          - The goal of this phase is to work on content expression. To do so, a new screen shows the completed network at the top, and the spaces needed to convert it back into a linear text are shown at the bottom.
        imgs:
          - src: /images/hyperToText.png
            alt: Transform the network into linear text
        presentation:
          - title: Iconic, combined and global
            text: In the <bold>iconic</bold>, <bold>combined</bold> and <bold>global</bold> presentation, we must drag the elements from the network to the correct position in the linear message, keeping in mind that
            steps:
              - Punctuation marks are replaced by the STOP image. We move from the left branch to the right branch with a STOP; sibling nodes when there are two or three are separated by a small stop representing a shorter pause. The Hyper (or network) ends with the large STOP.
              - If we try to place an element in the wrong location, the program allows us to pick it up and move it, but once we place it in an incorrect spot, the element returns to its original position. For example, if we pick up the boat and try to place it in a node instead of in the rectangle, the boat returns to its place in the initial text at the top.
              - If we try to complete the exercise out of order — for example, trying to pick up the sails before "the boat" — the program allows us to pick up that element, but once we place it, even if it is in the correct location, the element returns to its place.
              - Once we complete the exercise correctly, a reward will appear.
          - title: Symbolic
            text: "In the symbolic presentation, we will need to type the word from the linear message in the correct location, keeping three key points in mind:"
            steps:
              - If we make a mistake and write the word with incorrect spelling, the program will not allow us to continue.
              - If we try to write in the wrong location, without respecting the established order, the program will not allow us to work.
              - We must remember to place the punctuation marks "," "and" or "."

